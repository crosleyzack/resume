on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '**.tex'

jobs:
  build_oci_layers:
    name: "build and push OCI layers"
    runs-on: ubuntu-slim
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'src/go.mod'
          cache-dependency-path: 'src/go.sum'

      - name: Build OCI layer builder
        run: |
          cd src
          go build -o resume-oci .

      - name: Extract repository info
        id: repo
        run: |
          # Convert repository name to lowercase (required for ghcr.io)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Build OCI layout
        run: |
          cd src
          ./resume-oci \
            --output ../oci-layout

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.1

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

        # NOTE: for this to work you have to add the
        # - add the resume repo as the associate repository
        # - update package settings `Manage Actions access` to give this repo write permissions
      - name: Push OCI images
        run: |
          crane push oci-layout ghcr.io/${{ steps.repo.outputs.repository }}:latest
          crane push oci-layout ghcr.io/${{ steps.repo.outputs.repository }}:${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.0

      - name: Sign OCI images with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          # Keyless signing using GitHub OIDC token (id-token: write permission)
          # Signatures are stored in the transparency log (Rekor) and on the registry
          cosign sign --yes ghcr.io/${{ steps.repo.outputs.repository }}:latest
          cosign sign --yes ghcr.io/${{ steps.repo.outputs.repository }}:${{ github.sha }}

      - name: Verify signatures
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          # Verify the keyless signatures using the OIDC issuer
          cosign verify \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ghcr.io/${{ steps.repo.outputs.repository }}:latest

          cosign verify \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ghcr.io/${{ steps.repo.outputs.repository }}:${{ github.sha }}
