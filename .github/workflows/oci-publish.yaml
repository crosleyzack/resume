on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '**.tex'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build_oci_layers:
    name: "build and push OCI layers"
    runs-on: ubuntu-24.04
    needs: build_latex
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build OCI layer builder
        run: |
          cd src
          go build -o resume-oci .

      - name: Extract repository info
        id: repo
        run: |
          # Convert repository name to lowercase (required for ghcr.io)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Build OCI layout
        run: |
          cd src
          ./resume-oci \
            --repository "${{ steps.repo.outputs.repository }}" \
            --tag latest \
            --output ../oci-layout

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.1

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push OCI images
        run: |
          crane push oci-layout ghcr.io/${{ steps.repo.outputs.repository }}:latest
          crane push oci-layout ghcr.io/${{ steps.repo.outputs.repository }}:${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.0

      - name: Sign OCI images with cosign
        run: |
          cosign sign --yes ghcr.io/${{ steps.repo.outputs.repository }}:latest
          cosign sign --yes ghcr.io/${{ steps.repo.outputs.repository }}:${{ github.sha }}
