on:
  workflow_dispatch:
jobs:
  build_latex:
    name: "build pdf"
    # ubuntu-slim is usually preferred, but latex-action requires docker-in-docker
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
      - name: Push new compiled resume
        run: |
          git config user.name crosleyzack
          git config user.email mail@crosleyzack.com
          git add -f resume.pdf
          git diff --quiet && git diff --staged --quiet || git commit -m "[gh-action] Compile Resume"
          git push origin master
